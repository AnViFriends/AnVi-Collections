<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnVi Collections - Earrings for Kids & Ladies</title>
<style>
  body{font-family:Arial,sans-serif;margin:0;background:#fdf6f0;color:#333}
  header{background:#c9788d;color:#fff;padding:25px;text-align:center}
  header h1{margin:0;font-size:30px;letter-spacing:1px}
  header p{margin:5px 0 0;font-size:15px}
  .container{max-width:1000px;margin:20px auto;padding:0 15px}
  .tabs{display:flex;justify-content:center;gap:10px;margin-bottom:15px}
  .tabs button{padding:8px 16px;border:1px solid #c9788d;background:#fff;color:#c9788d;border-radius:20px;cursor:pointer}
  .tabs button.active{background:#c9788d;color:#fff}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}
  .card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.1);text-align:center}
  .card img{width:100%;height:180px;object-fit:cover;cursor:pointer}
  .card .info{padding:8px}
  .card .info b{display:block;font-size:15px}
  .card .info small{color:#777;display:block}
  .delbtn{background:#c9788d;color:#fff;border:none;padding:4px 8px;border-radius:5px;cursor:pointer;margin-top:5px;font-size:12px}
  #adminBar{background:#fff;padding:10px;text-align:center;border-bottom:1px solid #eee}
  #loginBox{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  input,select,button{padding:8px;border-radius:5px;border:1px solid #ccc}
  button{background:#c9788d;color:#fff;border:none;cursor:pointer}
  #uploadForm{display:none;margin-top:10px;gap:8px;flex-wrap:wrap;justify-content:center}
  #uploadForm.show{display:flex}
  footer{text-align:center;padding:15px;color:#999;font-size:13px}
  #status{font-size:12px;color:#888}
  #lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:999;align-items:center;justify-content:center}
  #lightbox.show{display:flex}
  #lightbox img{max-width:90%;max-height:90%;border-radius:8px}
  #lightbox .close{position:absolute;top:15px;right:25px;color:#fff;font-size:30px;cursor:pointer;user-select:none}
</style>
</head>
<body>
<header>
  <h1>✨ AnVi Collections ✨</h1>
  <p>Best Trendy & Traditional Vibe Handpicked Earrings for Kids & Ladies</p>
</header>

<div id="adminBar">
  <div id="loginBox">
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Admin Login</button>
  </div>
  <div id="uploadForm">
    <input type="text" id="itemName" placeholder="Item name">
    <input type="text" id="itemPrice" placeholder="Price (₹)">
    <select id="itemCategory">
      <option value="Kids">Kids</option>
      <option value="Ladies">Ladies</option>
    </select>
    <input type="file" id="itemImg" accept="image/*">
    <button onclick="addItem()">Add Item</button>
    <button onclick="logout()">Logout</button>
  </div>
  <div id="status"></div>
</div>

<div class="container">
  <div class="tabs">
    <button class="active" data-cat="All" onclick="filterCat('All',this)">All</button>
    <button data-cat="Kids" onclick="filterCat('Kids',this)">Kids</button>
    <button data-cat="Ladies" onclick="filterCat('Ladies',this)">Ladies</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<footer>© 2026 AnVi Collections. All rights reserved.</footer>

<div id="lightbox">
  <div class="close" onclick="closeLightbox()">&times;</div>
  <img id="lightboxImg" src="" alt="">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// >>> REPLACE WITH YOUR SUPABASE PROJECT URL AND ANON KEY <<<
const SUPABASE_URL = "https://dlypzzzmxavtlvcuityr.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Toty9J7Uy3gBUXx1rugsWQ_AzZapjky";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ADMIN_USER="admin", ADMIN_PASS="anvi2026";
let isAdmin=false;
let currentCat="All";
let allItems=[];

function login(){
  const u=document.getElementById('user').value;
  const p=document.getElementById('pass').value;
  if(u===ADMIN_USER && p===ADMIN_PASS){
    isAdmin=true;
    document.getElementById('loginBox').style.display='none';
    document.getElementById('uploadForm').classList.add('show');
    render();
  } else alert('Invalid credentials');
}
function logout(){
  isAdmin=false;
  document.getElementById('loginBox').style.display='flex';
  document.getElementById('uploadForm').classList.remove('show');
  render();
}
function filterCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function addItem(){
  const name=document.getElementById('itemName').value.trim();
  const price=document.getElementById('itemPrice').value.trim();
  const cat=document.getElementById('itemCategory').value;
  const file=document.getElementById('itemImg').files[0];
  if(!name||!file){alert('Name and image required');return}
  setStatus('Uploading...');
  try{
    const fileName = Date.now()+'_'+file.name.replace(/\s+/g,'_');
    const { error: upErr } = await sb.storage.from('Earrings').upload(fileName, file);
    if(upErr) throw upErr;
    const { data: urlData } = sb.storage.from('Earrings').getPublicUrl(fileName);
    const { error: dbErr } = await sb.from('items').insert({
      name, price, category: cat, img: urlData.publicUrl, path: fileName
    });
    if(dbErr) throw dbErr;
    document.getElementById('itemName').value='';
    document.getElementById('itemPrice').value='';
    document.getElementById('itemImg').value='';
    setStatus('');
    await loadItems();
  }catch(e){
    setStatus('Error: '+e.message);
  }
}

async function deleteItem(id, path){
  if(!confirm('Delete this item?'))return;
  try{
    await sb.from('items').delete().eq('id', id);
    if(path){ await sb.storage.from('Earrings').remove([path]); }
    await loadItems();
  }catch(e){alert('Error: '+e.message)}
}

function setStatus(msg){document.getElementById('status').textContent=msg;}

function openLightbox(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
}

async function loadItems(){
  setStatus('Loading...');
  try{
    const { data, error } = await sb.from('items').select('*').order('created_at', { ascending:false });
    if(error) throw error;
    allItems = data;
    setStatus('');
  }catch(e){
    setStatus('Error loading: '+e.message);
  }
  render();
}

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const items = currentCat==='All' ? allItems : allItems.filter(i=>i.category===currentCat);
  if(items.length===0){grid.innerHTML='<p>No items yet.</p>';return}
  items.forEach(item=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<img src="${item.img}" alt="${item.name}">
      <div class="info"><b>${item.name}</b>
      <small>${item.category||''}${item.price?' • ₹'+item.price:''}</small>
      ${isAdmin?'<button class="delbtn">Delete</button>':''}</div>`;
    card.querySelector('img').onclick=()=>openLightbox(item.img);
    if(isAdmin){
      card.querySelector('.delbtn').onclick=()=>deleteItem(item.id,item.path);
    }
    grid.appendChild(card);
  });
}

document.getElementById('lightbox').addEventListener('click',function(e){
  if(e.target===this){
    closeLightbox();
  }
});

loadItems();
</script>
</body>
</html>
